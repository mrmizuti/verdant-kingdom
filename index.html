<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Verdant Kingdom">
<meta name="theme-color" content="#4a8a28">
<title>The Verdant Kingdom</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,12px);
  --outline:#2a1a08;
  --panel-bg:#7a4a28;
  --panel-top:#9a6038;
  --panel-shadow:#4a2a10;
  --gold:#f5c842;
  --gold-shadow:#c89010;
  --gold-top:#fde878;
  --btn-green:#5aaa28;
  --btn-green-shadow:#2a6010;
  --btn-blue:#3888d8;
  --btn-blue-shadow:#1a5090;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;width:100%;overflow:hidden;background:#2a5010;font-family:'Nunito',sans-serif;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;max-width:430px;margin:0 auto;overflow:hidden;background:#2a5010;}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden;position:relative;}
.screen.active{display:flex;}

/* ═══════════════════════════════════════
   SHARED CHUNKY BUTTON STYLE
═══════════════════════════════════════ */
.chunky-btn{
  display:inline-flex;align-items:center;justify-content:center;
  border:3px solid var(--outline);
  border-radius:14px;
  cursor:pointer;
  position:relative;
  transition:transform .1s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.chunky-btn:active{transform:translateY(3px);}
.chunky-btn::after{
  content:'';position:absolute;
  bottom:-5px;left:2px;right:2px;height:5px;
  background:var(--btn-shadow,#333);
  border-radius:0 0 10px 10px;
  border:3px solid var(--outline);
  border-top:none;
  z-index:-1;
}

/* ═══════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════ */
#screen-home{background:#5ab8e8;}

.world-bg{position:absolute;inset:0;z-index:0;overflow:hidden;}
.world-bg svg{width:100%;height:100%;display:block;}

#motesContainer{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.mote{position:absolute;border-radius:50%;background:#ffe87a;pointer-events:none;animation:mote-rise linear infinite;}
@keyframes mote-rise{0%{opacity:0;transform:translateY(0)}25%{opacity:.8}80%{opacity:.4}100%{opacity:0;transform:translateY(-70px)}}

/* TOP HUD */
.top-hud{
  position:absolute;top:calc(var(--safe-top)+8px);left:0;right:0;
  z-index:20;display:flex;align-items:center;
  justify-content:space-between;padding:0 10px;gap:8px;
  pointer-events:none;
}

/* Player card top-left */
.player-card{
  background:var(--panel-bg);
  border:3px solid var(--outline);
  border-radius:14px;
  display:flex;align-items:center;gap:8px;
  padding:6px 10px 6px 6px;
  box-shadow:0 4px 0 var(--panel-shadow);
  pointer-events:all;
  min-width:130px;
}
.player-avatar{
  width:42px;height:42px;border-radius:10px;
  border:2.5px solid var(--outline);
  background:#4a8028;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;flex-shrink:0;
}
.player-info-col{display:flex;flex-direction:column;gap:3px;}
.player-level{font-size:10px;font-weight:900;color:#f5e0a0;letter-spacing:.03em;}
.player-name-lbl{font-size:13px;font-weight:900;color:white;line-height:1;}
.hp-bar-wrap{display:flex;flex-direction:column;gap:2px;}
.hp-bar-track{width:78px;height:6px;background:rgba(0,0,0,.4);border-radius:99px;overflow:hidden;border:1.5px solid rgba(0,0,0,.3);}
.hp-bar-fill{height:100%;background:linear-gradient(90deg,#e83030,#f86060);border-radius:99px;transition:width .6s ease;}
.en-bar-fill{background:linear-gradient(90deg,#c8a010,#f8d040);}
.hp-bar-lbl{font-size:9px;font-weight:900;color:#f5c070;line-height:1;}

/* Resource pills top-right */
.resource-pills{display:flex;align-items:center;gap:6px;}
.res-pill{
  background:rgba(20,10,5,.55);
  border:2.5px solid var(--outline);
  border-radius:99px;
  display:flex;align-items:center;gap:5px;
  padding:4px 10px 4px 6px;
  box-shadow:0 3px 0 rgba(0,0,0,.4);
}
.res-ico{font-size:16px;line-height:1;}
.res-val{font-size:12px;font-weight:900;color:white;}
.res-dot{width:8px;height:8px;border-radius:50%;background:#e83030;border:1.5px solid var(--outline);margin-left:2px;}

/* Grove companion */
.grove-area{
  position:absolute;
  left:50%;transform:translateX(-50%);
  bottom:calc(var(--safe-bottom) + 96px + 48px);
  z-index:10;
  cursor:pointer;
  animation:g-float 3.5s ease-in-out infinite;
  filter:drop-shadow(0 6px 0 rgba(0,0,0,.25));
}
@keyframes g-float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-12px)}}
.grove-area.pop{animation:g-pop .5s ease forwards;}
@keyframes g-pop{0%{transform:translateX(-50%) translateY(0) scale(1)}30%{transform:translateX(-50%) translateY(-20px) scale(1.08)}65%{transform:translateX(-50%) translateY(3px) scale(.97)}85%{transform:translateX(-50%) translateY(-5px) scale(1.02)}100%{transform:translateX(-50%) translateY(0) scale(1)}}

/* Heart floater */
.heart-floater{position:absolute;font-size:28px;pointer-events:none;z-index:50;animation:h-rise 1s ease forwards;}
@keyframes h-rise{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:.9;transform:translateY(-55px) scale(1.3)}100%{opacity:0;transform:translateY(-100px) scale(.6)}}

/* Big action button */
.action-btn-wrap{
  position:absolute;
  bottom:calc(var(--safe-bottom) + 96px + 10px);
  left:50%;transform:translateX(-50%);
  z-index:20;width:220px;
}
.action-btn{
  width:100%;
  background:var(--gold);
  border:3.5px solid var(--outline);
  border-radius:16px;
  padding:13px 20px 10px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;
  box-shadow:0 5px 0 var(--gold-shadow), 0 5px 0 2px var(--outline);
  transition:transform .1s, box-shadow .1s;
  -webkit-tap-highlight-color:transparent;
}
.action-btn:active{transform:translateY(4px);box-shadow:0 1px 0 var(--gold-shadow), 0 1px 0 2px var(--outline);}
.action-btn-top{
  position:absolute;inset:0;border-radius:13px;
  background:linear-gradient(180deg,var(--gold-top) 0%,transparent 60%);
  pointer-events:none;
}
.action-btn-title{font-size:18px;font-weight:900;color:var(--outline);letter-spacing:.02em;position:relative;z-index:1;}
.action-btn-sub{font-size:12px;font-weight:800;color:rgba(42,26,8,.6);position:relative;z-index:1;}

/* BOTTOM NAV */
/* ── BOTTOM NAV ── */
.bottom-nav{
  position:absolute;
  bottom:0;left:0;right:0;
  z-index:20;
  display:flex;
  align-items:stretch;
  background:transparent;
  padding:0;margin:0;
}
.nav-tile{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  background:#6a4228;
  border-top:3px solid var(--outline);
  border-left:1.5px solid var(--outline);
  border-right:1.5px solid var(--outline);
  border-bottom:none;
  border-radius:14px 14px 0 0;
  padding-bottom:calc(8px + var(--safe-bottom));
  padding-top:10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background .12s;
  overflow:visible;
  position:relative;
}
.nav-tile:first-child{ border-left:3px solid var(--outline); }
.nav-tile:last-child{ border-right:3px solid var(--outline); }
.nav-tile:active{ background:#503218; }

/* Active tile — same size, just gold background */
.nav-tile.active-tile{
  background:var(--gold);
  z-index:2;
}
.nav-tile.active-tile:active{ background:var(--gold-top); }

.nav-tile-ico{
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(28px, 9.5vw, 40px);
  line-height:1;
  /* no transform by default */
}

/* Active icon pops up, overlapping the top border */
.nav-tile.active-tile .nav-tile-ico{
  transform:translateY(-18px);
}

/* ═══════════════════════════════════════
   EXPLORE SCREEN
═══════════════════════════════════════ */
#screen-explore{
  background:linear-gradient(180deg,#3a7820 0%,#2a5a14 100%);
}
.exp-scene{position:absolute;inset:0;z-index:0;}
.exp-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;padding:0 24px calc(var(--safe-bottom)+100px);gap:16px;
}
.exp-panel{
  width:100%;max-width:320px;
  background:var(--panel-bg);
  border:3px solid var(--outline);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 5px 0 var(--panel-shadow), 0 5px 0 2px var(--outline);
}
.exp-panel-header{
  background:var(--panel-top);
  border-bottom:3px solid var(--outline);
  padding:12px 16px;
  font-size:18px;font-weight:900;color:white;
  letter-spacing:.04em;text-align:center;
}
.exp-btn-row{
  display:flex;flex-direction:column;gap:0;
}
.exp-row-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;
  border-bottom:2px solid rgba(0,0,0,.2);
  cursor:pointer;transition:background .15s;
  -webkit-tap-highlight-color:transparent;
}
.exp-row-btn:last-child{border-bottom:none;}
.exp-row-btn:active{background:rgba(0,0,0,.15);}
.exp-row-ico{
  width:44px;height:44px;border-radius:12px;
  border:2.5px solid var(--outline);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.exp-row-ico.gold{background:var(--gold);box-shadow:0 3px 0 var(--gold-shadow);}
.exp-row-ico.brown{background:#9a7048;box-shadow:0 3px 0 #6a4028;}
.exp-row-text{}
.exp-row-title{font-size:15px;font-weight:900;color:white;}
.exp-row-sub{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);margin-top:2px;}

/* ═══════════════════════════════════════
   BATTLE SCREEN
═══════════════════════════════════════ */
#screen-battle{background:#1a0a30;}

.battle-scene{position:absolute;inset:0;z-index:0;}
.battle-scene svg{width:100%;height:100%;display:block;}

.battle-ui{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;}
.battle-field{
  flex:1;display:flex;flex-direction:row;
  align-items:flex-end;justify-content:space-between;
  padding:calc(var(--safe-top)+12px) 16px 12px;
  min-height:0;
}

/* Enemy side — right */
.enemy-side{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.enemy-plate{
  background:rgba(20,8,40,.75);
  border:2.5px solid rgba(200,80,255,.4);
  border-radius:12px;
  padding:7px 12px;
  display:flex;flex-direction:column;align-items:flex-end;gap:4px;
}
.enemy-name-lbl{font-size:13px;font-weight:900;color:#e0c0ff;text-align:right;}
.enemy-status-chip{
  font-size:10px;font-weight:900;color:#ff6060;
  background:rgba(180,20,20,.3);border:1.5px solid rgba(255,60,60,.4);
  border-radius:99px;padding:2px 9px;
}
.e-hp-track{width:140px;height:8px;background:rgba(0,0,0,.5);border-radius:99px;overflow:hidden;border:1.5px solid rgba(255,255,255,.1);}
.e-hp-fill{height:100%;background:linear-gradient(90deg,#a01818,#e03030);border-radius:99px;transition:width .5s ease;}
.e-hp-lbl{font-size:9px;font-weight:900;color:#d09090;text-align:right;}
.enemy-sprite-wrap{animation:e-float 3s ease-in-out infinite;}
@keyframes e-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.enemy-sprite-wrap.hit{animation:e-hit .3s ease forwards;}
@keyframes e-hit{0%{transform:translateX(0)}25%{transform:translateX(10px)}75%{transform:translateX(-7px)}100%{transform:translateX(0)}}
.enemy-sprite-wrap.heal{animation:e-heal .6s ease forwards;}
@keyframes e-heal{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}

/* Player side — left */
.player-side-b{display:flex;flex-direction:column;align-items:flex-start;gap:6px;}
.player-plate{
  background:rgba(10,30,8,.75);
  border:2.5px solid rgba(80,200,60,.35);
  border-radius:12px;
  padding:7px 12px;
  display:flex;flex-direction:column;gap:4px;
}
.p-bars-side{display:flex;flex-direction:column;gap:4px;width:130px;}
.p-bar-item{display:flex;align-items:center;gap:6px;}
.p-bar-lbl-b{font-size:10px;font-weight:900;color:#a0e080;width:22px;}
.p-bar-track-b{flex:1;height:7px;background:rgba(0,0,0,.5);border-radius:99px;overflow:hidden;border:1.5px solid rgba(255,255,255,.08);}
.p-bar-fill-b{height:100%;border-radius:99px;transition:width .5s ease;}
.p-hp-fill{background:linear-gradient(90deg,#b02020,#e84040);}
.p-mp-fill{background:linear-gradient(90deg,#2040a0,#4080e0);}
.player-sprite-b{animation:p-idle 4s ease-in-out infinite;}
@keyframes p-idle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.player-sprite-b.attack{animation:p-atk .4s ease forwards;}
@keyframes p-atk{0%{transform:translateX(0)}40%{transform:translateX(38px) scale(1.06)}75%{transform:translateX(-6px)}100%{transform:translateX(0) scale(1)}}

/* Battle log panel */
.battle-log-panel{
  margin:0 12px 8px;
  background:rgba(10,5,20,.82);
  border:2.5px solid rgba(150,80,255,.3);
  border-radius:14px;
  padding:10px 14px;
  font-size:13px;font-weight:700;
  color:#c0a0e8;line-height:1.5;
  min-height:50px;flex-shrink:0;
  font-family:'Nunito',sans-serif;
}

/* Battle menu panel */
.battle-menu-panel{
  flex-shrink:0;
  background:var(--panel-bg);
  border-top:3px solid var(--outline);
  padding:10px 10px calc(10px + var(--safe-bottom));
}
.b-menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.b-btn{
  background:var(--panel-top);
  border:3px solid var(--outline);
  border-radius:14px;
  padding:12px 8px 9px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;
  box-shadow:0 4px 0 var(--panel-shadow);
  transition:transform .1s, box-shadow .1s;
  -webkit-tap-highlight-color:transparent;
}
.b-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--panel-shadow);}
.b-btn:disabled{opacity:.4;pointer-events:none;}
.b-btn-ico{font-size:24px;line-height:1;}
.b-btn-lbl{font-size:12px;font-weight:900;color:white;letter-spacing:.02em;}

/* Victory overlay */
.victory-wrap{
  position:absolute;inset:0;z-index:60;
  background:rgba(10,5,20,.92);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:14px;padding:36px;
}
.victory-wrap.show{display:flex;}
.v-ico{font-size:56px;}
.v-title{font-size:26px;font-weight:900;color:white;text-align:center;}
.v-msg{font-size:13px;font-weight:700;color:#a0c880;text-align:center;line-height:1.65;max-width:280px;}
.v-rewards{display:flex;gap:12px;}
.v-reward{
  display:flex;align-items:center;gap:7px;
  background:var(--panel-bg);
  border:2.5px solid var(--outline);
  border-radius:12px;padding:10px 18px;
  font-size:15px;font-weight:900;color:white;
  box-shadow:0 4px 0 var(--panel-shadow);
}
.v-reward.gold-reward{background:var(--gold);color:var(--outline);}
.btn-continue{
  background:var(--btn-green);
  border:3px solid var(--outline);
  border-radius:14px;
  padding:14px 40px;
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;
  color:white;cursor:pointer;
  box-shadow:0 5px 0 var(--btn-green-shadow), 0 5px 0 2px var(--outline);
  transition:transform .1s;letter-spacing:.04em;
}
.btn-continue:active{transform:translateY(4px);box-shadow:0 1px 0 var(--btn-green-shadow), 0 1px 0 2px var(--outline);}

/* Floaters */
.floater{position:absolute;font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;pointer-events:none;z-index:50;animation:float-up .9s ease forwards;}
@keyframes float-up{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.floater.dmg{color:#ff5050;-webkit-text-stroke:2px #300;}
.floater.heal{color:#50e850;-webkit-text-stroke:2px #030;}
.floater.special{color:#80c0ff;-webkit-text-stroke:2px #003;}
</style>
</head>
<body>
<div id="app">

<!-- ═══════════════════════════════════════
     HOME SCREEN
═══════════════════════════════════════ -->
<div class="screen active" id="screen-home">

  <!-- World background -->
  <div class="world-bg">
    <svg viewBox="0 0 430 780" preserveAspectRatio="xMidYMid slice">
      <!-- Sky -->
      <rect width="430" height="780" fill="#5ab8e8"/>
      <!-- Sun glow -->
      <circle cx="340" cy="80" r="52" fill="#ffe87a" opacity=".35"/>
      <circle cx="340" cy="80" r="36" fill="#ffe060"/>
      <!-- Cloud 1 -->
      <ellipse cx="120" cy="90" rx="62" ry="26" fill="white"/>
      <ellipse cx="88" cy="98" rx="36" ry="22" fill="white"/>
      <ellipse cx="155" cy="96" rx="34" ry="20" fill="white"/>
      <!-- Cloud 2 -->
      <ellipse cx="310" cy="60" rx="46" ry="20" fill="white" opacity=".9"/>
      <ellipse cx="282" cy="68" rx="28" ry="16" fill="white" opacity=".9"/>
      <ellipse cx="340" cy="66" rx="26" ry="15" fill="white" opacity=".9"/>
      <!-- Distant hills -->
      <ellipse cx="100" cy="520" rx="200" ry="160" fill="#7acc48"/>
      <ellipse cx="340" cy="510" rx="200" ry="155" fill="#72c040"/>
      <!-- Back trees (thick outlines, cartoon) -->
      <!-- Tree L -->
      <rect x="12" y="340" width="22" height="160" rx="8" fill="#7a4a1a" stroke="#2a1a08" stroke-width="3"/>
      <ellipse cx="23" cy="330" rx="44" ry="100" fill="#2a8018" stroke="#1a5010" stroke-width="3"/>
      <ellipse cx="23" cy="310" rx="36" ry="80" fill="#38a020" stroke="#1a5010" stroke-width="3"/>
      <!-- Tree R -->
      <rect x="396" y="350" width="22" height="150" rx="8" fill="#7a4a1a" stroke="#2a1a08" stroke-width="3"/>
      <ellipse cx="407" cy="340" rx="44" ry="95" fill="#2a8018" stroke="#1a5010" stroke-width="3"/>
      <ellipse cx="407" cy="320" rx="36" ry="76" fill="#38a020" stroke="#1a5010" stroke-width="3"/>
      <!-- Mid trees -->
      <rect x="56" y="380" width="18" height="130" rx="6" fill="#7a4a1a" stroke="#2a1a08" stroke-width="2.5"/>
      <ellipse cx="65" cy="370" rx="36" ry="78" fill="#30a020" stroke="#1a5010" stroke-width="2.5"/>
      <ellipse cx="65" cy="352" rx="28" ry="62" fill="#42b828" stroke="#1a5010" stroke-width="2.5"/>
      <rect x="355" y="388" width="18" height="125" rx="6" fill="#7a4a1a" stroke="#2a1a08" stroke-width="2.5"/>
      <ellipse cx="364" cy="378" rx="36" ry="75" fill="#30a020" stroke="#1a5010" stroke-width="2.5"/>
      <ellipse cx="364" cy="360" rx="28" ry="60" fill="#42b828" stroke="#1a5010" stroke-width="2.5"/>
      <!-- Ground -->
      <ellipse cx="215" cy="590" rx="280" ry="120" fill="#7acc48"/>
      <rect x="0" y="590" width="430" height="200" fill="#6ab840"/>
      <!-- Ground outline -->
      <path d="M0 562 Q108 520 215 530 Q322 520 430 562" stroke="#4a9820" stroke-width="4" fill="none"/>
      <!-- Flowers -->
      <circle cx="120" cy="575" r="7" fill="#ffe060" stroke="#2a1a08" stroke-width="2"/>
      <circle cx="130" cy="565" r="5" fill="white" stroke="#2a1a08" stroke-width="1.5"/>
      <circle cx="290" cy="570" r="6" fill="#ff8090" stroke="#2a1a08" stroke-width="2"/>
      <circle cx="300" cy="578" r="5" fill="#ffe060" stroke="#2a1a08" stroke-width="1.5"/>
      <circle cx="340" cy="568" r="5" fill="white" stroke="#2a1a08" stroke-width="1.5"/>
      <!-- Grass tufts -->
      <path d="M80 590 Q84 578 88 590" stroke="#4a9820" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M90 590 Q95 574 100 590" stroke="#3a8818" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M330 590 Q334 576 338 590" stroke="#4a9820" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M340 590 Q345 578 350 590" stroke="#3a8818" stroke-width="3" fill="none" stroke-linecap="round"/>

function rand(a){return a[Math.floor(Math.random()*a.length)];}
function randInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function toast(msg){
  var t=document.getElementById('toast2');
  t.textContent=msg;t.classList.add('show');
  t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.style.opacity='0';t.style.transform='translateX(-50%) translateY(-6px)';},1800);
}

function updateWater(){document.getElementById('waterLbl').textContent=G.water;}

function petGrove(){
  var now=Date.now();
  petTapTimes=petTapTimes.filter(function(t){return now-t<1500;});
  petTapTimes.push(now);
  var w=document.getElementById('groveWrap');
  w.classList.remove('pop');void w.offsetWidth;w.classList.add('pop');
  setTimeout(function(){w.classList.remove('pop');},600);
  var angry=petTapTimes.length>=5;
  spawnHeart(angry);
  if(angry)petTapTimes=[];
}

function spawnHeart(angry){
  var wrap=document.getElementById('groveWrap');
  if(!wrap)return;
  var rect=wrap.getBoundingClientRect();
  var f=document.createElement('div');
  f.className='heart-floater';
  f.textContent=angry?'😠':['❤️','💚','💛','🌸','✨'][Math.floor(Math.random()*5)];
  f.style.left=(rect.left+rect.width/2-16+(Math.random()*40-20))+'px';
  f.style.top=(rect.top+rect.height/3)+'px';
  f.style.position='fixed';
  document.getElementById('app').appendChild(f);
  setTimeout(function(){f.remove();},1100);
}

function spawnMotes(){
  var c=document.getElementById('motesContainer');
  for(var i=0;i<10;i++){
    (function(idx){
      var m=document.createElement('div');m.className='mote';
      var sz=2+Math.random()*3;
      m.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(5+Math.random()*90)+'%;bottom:'+(20+Math.random()*50)+'%;animation-duration:'+(5+Math.random()*6)+'s;animation-delay:'+(idx*.5+Math.random()*2)+'s';
      c.appendChild(m);
    })(i);
  }
}

function navTo(id){
  // Always show home screen — each button just updates the active highlight
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-home').classList.add('active');
  // Update active tile in the home nav
  document.querySelectorAll('#bottomNav .nav-tile').forEach(function(t){t.classList.remove('active-tile');});
  var idx = ['camp','pack','battle-hub','explore','settings'].indexOf(id);
  var tiles = document.querySelectorAll('#bottomNav .nav-tile');
  if(idx >= 0 && tiles[idx]) tiles[idx].classList.add('active-tile');
  cur = id;
}

var B={enemy:null,eHp:0,eMaxHp:0,pHp:100,pMaxHp:100,pMp:100,pMaxMp:100,phase:0,busy:false};
var ATTACK_LINES=["Grove sends a wave of roots!","Grove strikes with a vine whip!","Grove hurls a cluster of seeds!","Grove channels forest energy!"];
var SPECIAL_LINES=["Grove pulses with ancient root energy!","The forest answers Grove's call!","Grove unleashes a burst of pure life!","Grove's leaves shimmer and release a pulse!"];
var ENEMY_LINES=["The tainted spirit lashes out with dark tendrils!","A wave of corrupted energy washes over Grove!","The creature's eyes flash as it strikes!","Dark thorns fly from the tainted one!"];
var HEAL_LINES=["Grove draws on the forest's warmth to recover.","A gentle rain of spores soothes Grove's wounds.","Grove roots into the earth and heals.","The forest breathes life back into Grove."];
var FINAL_LINES=["Grove reaches out and channels pure light into the darkness...","Grove whispers an ancient word — the corruption begins to shatter...","With everything they have, Grove sends pure love into the tainted one..."];

function startBattle(){
  B.enemy=ENEMIES[Math.floor(Math.random()*ENEMIES.length)];
  B.eMaxHp=randInt(60,100);B.eHp=B.eMaxHp;
  B.pHp=100;B.pMaxHp=100;B.pMp=100;B.pMaxMp=100;
  B.phase=0;B.busy=false;
  document.getElementById('victoryWrap').classList.remove('show');
  document.getElementById('enemyName').textContent=B.enemy.name;
  document.getElementById('enemySprite').innerHTML=B.enemy.svg(true);
  setMenuEnabled(true);
  updateBattleBars();
  setLog(B.enemy.name+' steps into the clearing, eyes glowing with a tainted light...');
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.nav-tile').forEach(function(b){b.classList.remove('on');});
  document.getElementById('screen-battle').classList.add('active');
  cur='battle';
}

function updateBattleBars(){
  document.getElementById('enemyHpBar').style.width=Math.max(0,B.eHp/B.eMaxHp*100)+'%';
  document.getElementById('enemyHpLbl').textContent='HP: '+Math.max(0,B.eHp)+' / '+B.eMaxHp;
  document.getElementById('pHpBar').style.width=Math.max(0,B.pHp/B.pMaxHp*100)+'%';
  document.getElementById('pMpBar').style.width=Math.max(0,B.pMp/B.pMaxMp*100)+'%';
}
function setLog(m){document.getElementById('battleLog').textContent=m;}
function setMenuEnabled(on){['btnAttack','btnSpecial','btnHeal','btnRetreat'].forEach(function(id){document.getElementById(id).disabled=!on;});}

function spawnFloater(text,type,targetId){
  var el=document.getElementById(targetId);if(!el)return;
  var rect=el.getBoundingClientRect();
  var f=document.createElement('div');f.className='floater '+type;f.textContent=text;
  f.style.left=(rect.left+rect.width/2-20)+'px';f.style.top=(rect.top+rect.height/2-20)+'px';
  f.style.position='fixed';
  document.getElementById('app').appendChild(f);
  setTimeout(function(){f.remove();},950);
}
function animEl(id,cls){
  var el=document.getElementById(id);if(!el)return;
  el.classList.remove(cls);void el.offsetWidth;el.classList.add(cls);
  setTimeout(function(){el.classList.remove(cls);},600);
}

function doAction(type){
  if(B.busy||B.phase!==0)return;
  B.busy=true;setMenuEnabled(false);
  if(type==='retreat'){
    setLog('Grove retreats gracefully. "We\'ll try again."');
    setTimeout(function(){navTo('battle-hub');},1500);return;
  }
  if(type==='attack'){
    var dmg=randInt(10,22);B.eHp-=dmg;
    setLog(rand(ATTACK_LINES)+' (-'+dmg+')');
    animEl('playerSprite','attack');
    setTimeout(function(){animEl('enemySprite','hit');spawnFloater('-'+dmg,'dmg','enemySprite');updateBattleBars();},350);
  } else if(type==='special'){
    if(B.pMp<20){setLog('Not enough energy for Root Pulse...');B.busy=false;setMenuEnabled(true);return;}
    var dmg2=randInt(22,40);B.pMp-=20;B.eHp-=dmg2;
    setLog(rand(SPECIAL_LINES)+' (-'+dmg2+')');
    animEl('playerSprite','attack');
    setTimeout(function(){animEl('enemySprite','hit');spawnFloater('-'+dmg2,'special','enemySprite');updateBattleBars();},350);
  } else if(type==='healself'){
    var h=randInt(15,28);B.pHp=Math.min(B.pMaxHp,B.pHp+h);
    setLog(rand(HEAL_LINES)+' (+'+h+')');
    spawnFloater('+'+h,'heal','playerSprite');updateBattleBars();
  }
  setTimeout(function(){
    if(B.eHp<=Math.ceil(B.eMaxHp*.2)&&B.phase===0){
      B.phase=1;setMenuEnabled(false);
      setLog(rand(FINAL_LINES));
      animEl('playerSprite','attack');
      setTimeout(function(){
        B.eHp=B.eMaxHp;updateBattleBars();
        animEl('enemySprite','heal');
        spawnFloater('✨','special','enemySprite');
        document.getElementById('enemySprite').innerHTML=B.enemy.svg(false);
        setTimeout(function(){showVictory();},1200);
      },1000);return;
    }
    if(B.phase===0&&B.eHp>0){
      setTimeout(function(){
        var ed=randInt(8,18);B.pHp=Math.max(0,B.pHp-ed);
        setLog(rand(ENEMY_LINES)+' (-'+ed+')');
        animEl('enemySprite','hit');
        setTimeout(function(){
          spawnFloater('-'+ed,'dmg','playerSprite');updateBattleBars();
          if(B.pHp<=0){setLog('Grove collapses... "It\'s okay. We\'ll come back."');setTimeout(function(){navTo('battle-hub');},2200);return;}
          B.busy=false;setMenuEnabled(true);
        },300);
      },700);
    } else {B.busy=false;if(B.phase===0)setMenuEnabled(true);}
  },700);
}

function showVictory(){
  var xp=randInt(15,50),wd=randInt(3,12);
  G.water+=wd;G.xp+=xp;updateWater();
  document.getElementById('vTitle').textContent=B.enemy.name+' is free!';
  document.getElementById('vMsg').textContent='The darkness fades. '+B.enemy.name+' blinks slowly, as if waking from a long dream. They look at you — and smile.';
  document.getElementById('xpGain').textContent='+'+xp+' XP';
  document.getElementById('wdGain').textContent='+'+wd;
  document.getElementById('victoryWrap').classList.add('show');
}
function endBattle(){document.getElementById('victoryWrap').classList.remove('show');navTo('battle-hub');}

spawnMotes();
updateWater();
</script>
</body>
